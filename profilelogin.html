<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Register</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="title">Welcome</div>

      <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
      </div>

      <form id="loginForm" class="form active">
        <input id="loginUsername" type="text" placeholder="Username" required />
        <input
          id="loginPassword"
          type="password"
          placeholder="Password"
          required
        />
        <button type="button" onclick="login()" class="submit">Login</button>
      </form>

      <form id="registerForm" class="form">
        <input
          id="registerUsername"
          type="text"
          placeholder="Username"
          required
        />
        <input id="registerEmail" type="email" placeholder="Email" required />
        <input
          id="registerPassword"
          type="password"
          placeholder="Password"
          required
        />
        <button type="button" id="registerBtn" class="submit">
          Create account
        </button>
      </form>

      <div class="footer">OR</div>
      <button type="button" id="Google" class="submit">
        Login with Google
      </button>
    </div>

    <!-- ✅ Firebase compat (ONLY 1 SYSTEM) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
      // Tabs
      const loginTab = document.getElementById("loginTab");
      const registerTab = document.getElementById("registerTab");
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");

      loginTab.onclick = () => {
        loginTab.classList.add("active");
        registerTab.classList.remove("active");
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
      };

      registerTab.onclick = () => {
        registerTab.classList.add("active");
        loginTab.classList.remove("active");
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
      };

      // Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyBVbNvpjsSjSyGTn5Kvk5iaAi0S2KvF5Ks",
        authDomain: "jsi04-c3a8c.firebaseapp.com",
        projectId: "jsi04-c3a8c",
        storageBucket: "jsi04-c3a8c.firebasestorage.app",
        messagingSenderId: "241743024495",
        appId: "1:241743024495:web:31c9c9cf6cc87fb757d89a",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const auth = firebase.auth();

      // REGISTER (Firestore basic - giữ nguyên logic cũ)
      document.getElementById("registerBtn").addEventListener("click", () => {
        const username = document
          .getElementById("registerUsername")
          .value.trim();
        const password = document
          .getElementById("registerPassword")
          .value.trim();
        const email = document.getElementById("registerEmail").value.trim();

        if (!username || !password || !email) {
          alert("Nhập đầy đủ đi");
          return;
        }

        db.collection("users")
          .doc(username)
          .set({ username, password, email })
          .then(() => {
            alert("Đăng ký thành công");
          })
          .catch((err) => alert(err.message));
      });

      // LOGIN (Firestore basic)
      function login() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();

        db.collection("users")
          .doc(username)
          .get()
          .then((doc) => {
            if (!doc.exists) {
              alert("Không tồn tại tài khoản");
              return;
            }

            if (doc.data().password === password) {
              alert("Đăng nhập thành công");
              window.location.href = "error2.html";
            } else {
              alert("Sai mật khẩu");
            }
          })
          .catch(() => alert("Lỗi hệ thống"));
      }

      // ✅ GOOGLE LOGIN (FIXED)
      const provider = new firebase.auth.GoogleAuthProvider();

      document.getElementById("Google").addEventListener("click", () => {
        auth
          .signInWithPopup(provider)
          .then((result) => {
            const user = result.user;

            return db
              .collection("users")
              .doc(user.uid)
              .get()
              .then((doc) => {
                if (!doc.exists) {
                  return db.collection("users").doc(user.uid).set({
                    uid: user.uid,
                    name: user.displayName,
                    email: user.email,
                    avatar: user.photoURL,
                    createdAt: new Date(),
                  });
                }
              })
              .then(() => {
                alert("Login success: " + user.email);
                window.location.href = "error2.html";
              });
          })
          .catch((error) => {
            console.error(error);
            alert(error.message);
          });
      });
    </script>
  </body>
</html>
