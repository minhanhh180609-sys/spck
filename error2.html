<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Home</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="homestyle.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div>abcd</div>

      <div class="nav-right">
        <!-- SEARCH -->
        <div class="search-box">
          <input type="email" id="searchEmail" placeholder="Search email..." />
          <button id="btnSearch">Search</button>
        </div>

        <div>Xin chào</div>
      </div>
    </div>

    <div class="container">
      <div class="sidebar">
        <div class="menu active" onclick="showPage('home', this)">Home</div>

        <div
          id="sidebarFriendsContainer"
          style="
            display: flex;
            flex-direction: column;
            gap: inherit;
            width: 100%;
          "
        ></div>
      </div>

      <div class="content">
        <div id="home" class="page active">
          <h2>Home</h2>
          <div class="card">Welcome</div>
        </div>

        <div id="chatPage" class="page">
          <div class="chat-area">
            <div
              class="chat-header"
              id="chatHeader"
              style="
                padding: 15px;
                font-weight: bold;
                background: #fff;
                border-bottom: 1px solid #eee;
              "
            >
              Chọn một người bạn để bắt đầu chat
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
              <input
                type="text"
                id="msgInput"
                placeholder="Nhập tin nhắn..."
                disabled
              />
              <button id="btnSend" disabled>Gửi</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">© 2026 - UI đồng bộ login ✔</div>

    <script>
      // 1. Hàm kiểm tra trạng thái đăng nhập
      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUserId = user.uid;
          loadFriendList(); // Tải danh sách bạn bè ra sidebar ngay khi đăng nhập
        } else {
          window.location.href = "profilelogin.html";
        }
      });

      // 2. Hàm chuyển đổi mục chọn ở Sidebar và Content
      window.showPage = function (pageId, element) {
        // Ẩn tất cả các trang content hiện tại
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));

        // Hiển thị trang content được chọn (home hoặc chatPage)
        const targetPage = document.getElementById(pageId);
        if (targetPage) targetPage.classList.add("active");

        // Xóa trạng thái active (bôi trắng) ở TẤT CẢ các nút trên sidebar (cả nút Home lẫn nút Bạn bè)
        document
          .querySelectorAll(".menu, .menu-friend")
          .forEach((m) => m.classList.remove("active"));

        // Bôi trắng (Active) nút vừa được click
        if (element) element.classList.add("active");
      };

      // 3. TẢI DANH SÁCH BẠN BÈ THÀNH CÁC NÚT MENU TRÊN SIDEBAR
      async function loadFriendList() {
        const container = document.getElementById("sidebarFriendsContainer");
        container.innerHTML = ""; // Xóa danh sách cũ để tải mới

        try {
          const myFriendsRef = ref(db, `users/${currentUserId}/friends`);
          const snapshot = await get(myFriendsRef);

          if (!snapshot.exists()) {
            return; // Nếu chưa có bạn bè thì không hiện nút nào thêm
          }

          // Duyệt qua danh sách UID bạn bè
          for (const friendUid of Object.keys(snapshot.val())) {
            const friendInfoDoc = await get(ref(db, `users/${friendUid}`));

            if (friendInfoDoc.exists()) {
              const friendData = friendInfoDoc.val();

              // Tạo một nút div mới cho người bạn này
              const friendButton = document.createElement("div");

              // Sử dụng class 'menu' để nó lấy giao diện y hệt nút Home của bạn
              friendButton.classList.add("menu");
              friendButton.innerText = friendData.username || friendData.email;

              // SỰ KIỆN CLICK: Đổi mục sidebar -> Đổi content thành Khung chat
              friendButton.addEventListener("click", () => {
                // 1. Chuyển sang trang chatPage và active nút này lên
                showPage("chatPage", friendButton);

                // 2. Kích hoạt phòng chat riêng với người bạn này
                openChatBox(friendData);
              });

              // Thêm nút bạn bè này vào dưới nút Home ở Sidebar
              container.appendChild(friendButton);
            }
          }
        } catch (err) {
          console.error("Lỗi khi tải danh sách menu bạn bè:", err);
        }
      }

      // 4. MỞ PHÒNG CHAT RIÊNG BIỆT (Thời gian thực)
      function openChatBox(friendData) {
        activeFriendId = friendData.uid;

        // Đổi tiêu đề khung chat thành tên người đang nhắn
        document.getElementById("chatHeader").innerText =
          "Đang chat với: " + (friendData.username || friendData.email);

        // Mở khóa ô nhập liệu và nút gửi
        document.getElementById("msgInput").disabled = false;
        document.getElementById("btnSend").disabled = false;

        // Tạo mã phòng chat chung duy nhất giữa 2 người
        currentRoomId =
          currentUserId < activeFriendId
            ? `${currentUserId}_${activeFriendId}`
            : `${activeFriendId}_${currentUserId}`;

        // Xóa sạch tin nhắn của người cũ trên màn hình
        const msgContainer = document.getElementById("messagesContainer");
        msgContainer.innerHTML = "";

        // Hủy lắng nghe phòng cũ nếu đang mở
        if (currentChatListenRef) {
          off(currentChatListenRef);
        }

        // Lắng nghe tin nhắn thời gian thực từ Firebase của phòng mới này
        currentChatListenRef = ref(db, `chats/${currentRoomId}/messages`);
        onChildAdded(currentChatListenRef, (snapshot) => {
          const msgData = snapshot.val();
          displayMessage(msgData.text, msgData.sender);
        });
      }

      // Hàm hiển thị bong bóng tin nhắn
      function displayMessage(text, senderId) {
        const container = document.getElementById("messagesContainer");
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("msg");
        msgDiv.classList.add(senderId === currentUserId ? "sent" : "received");
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight; // Tự cuộn xuống dưới cùng
      }

      // 5. LOGIC GỬI TIN NHẮN
      function sendChatMessage() {
        const text = document.getElementById("msgInput").value.trim();
        if (!text || !currentRoomId) return;

        const messagesRef = ref(db, `chats/${currentRoomId}/messages`);
        push(messagesRef, {
          sender: currentUserId,
          text: text,
          timestamp: Date.now(),
        });

        document.getElementById("msgInput").value = "";
      }

      document
        .getElementById("btnSend")
        .addEventListener("click", sendChatMessage);
      document.getElementById("msgInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendChatMessage();
      });
    </script>
  </body>
</html>
