<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friend Chat</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #e5ddd5;
        margin: 0;
        display: flex;
        justify-content: center;
        height: 100vh;
      }

      .hidden {
        display: none !important;
      }

      /* Login Screen */
      #login-screen {
        text-align: center;
        margin-top: 100px;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        background: #25d366;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
      }
      button:hover {
        background: #20bd5a;
      }

      /* Chat Screen */
      #chat-screen {
        width: 100%;
        max-width: 600px;
        background: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        background: #075e54;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header button {
        background: #25d366;
        font-size: 12px;
        padding: 5px 10px;
      }

      #messages-container {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 10px;
        position: relative;
        word-wrap: break-word;
      }
      .message p {
        margin: 0;
      }
      .message small {
        font-size: 10px;
        color: #555;
        display: block;
        margin-top: 5px;
        text-align: right;
      }

      /* My messages (Right) */
      .my-message {
        align-self: flex-end;
        background-color: #dcf8c6;
      }

      /* Friend messages (Left) */
      .friend-message {
        align-self: flex-start;
        background-color: #fff;
        border: 1px solid #eee;
      }

      #message-form {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        background: #f0f0f0;
      }
      #message-input {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid #ccc;
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN SECTION -->
    <div id="login-screen">
      <h1>Welcome</h1>
      <button id="login-btn">Sign in with Google</button>
    </div>

    <!-- CHAT SECTION -->
    <div id="chat-screen" class="hidden">
      <header>
        <h2>Chat Room</h2>
        <button id="logout-btn">Logout</button>
      </header>

      <div id="messages-container">
        <!-- Messages appear here -->
      </div>

      <form id="message-form">
        <input
          type="text"
          id="message-input"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button type="submit">Send</button>
      </form>
    </div>

    <!-- FIREBASE SDKs (Modular v9) -->
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
        onSnapshot,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      // PASTE YOUR CONFIG FROM FIREBASE CONSOLE BELOW
      const firebaseConfig = {
        apiKey: "AIzaSyBVbNvpjsSjSyGTn5Kvk5iaAi0S2KvF5Ks",
        authDomain: "jsi04-c3a8c.firebaseapp.com",
        databaseURL:
          "https://jsi04-c3a8c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jsi04-c3a8c",
        storageBucket: "jsi04-c3a8c.firebasestorage.app",
        messagingSenderId: "241743024495",
        appId: "1:241743024495:web:31c9c9cf6cc87fb757d89a",
        measurementId: "G-67CWVS1Y02",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      // Logic handlers (defined in app.js)
      import {
        login,
        logout,
        sendMessage,
        observeAuth,
        observeChat,
      } from "./app.js";

      // Attach listeners
      document.getElementById("login-btn").addEventListener("click", login);
      document.getElementById("logout-btn").addEventListener("click", logout);
      document
        .getElementById("message-form")
        .addEventListener("submit", sendMessage);

      // Initial State Check
      onAuthStateChanged(auth, (user) => {
        observeAuth(user);
        if (user) observeChat();
      });
    </script>
    <script type="module">
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
        onSnapshot,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

      // Variables passed from HTML script scope (Quick workaround for single file logic feel)
      // Re-declaring strictly here for clarity if separating files

      // --- AUTHENTICATION ---
      const login = () => signInWithPopup(auth, provider);
      const logout = () => signOut(auth);

      // --- UI UPDATES ---
      const observeAuth = (user) => {
        if (user) {
          document.getElementById("login-screen").classList.add("hidden");
          document.getElementById("chat-screen").classList.remove("hidden");
        } else {
          document.getElementById("login-screen").classList.remove("hidden");
          document.getElementById("chat-screen").classList.add("hidden");
        }
      };

      // --- DATABASE (CHAT) ---
      const sendMessage = async (e) => {
        e.preventDefault();
        const text = document.getElementById("message-input").value;
        if (!text.trim()) return;

        await addDoc(collection(db, "messages"), {
          text: text,
          uid: auth.currentUser.uid,
          photoURL: auth.currentUser.photoURL,
          displayName: auth.currentUser.displayName,
          createdAt: serverTimestamp(),
        });

        document.getElementById("message-input").value = "";
      };

      const observeChat = () => {
        const q = query(
          collection(db, "messages"),
          orderBy("createdAt", "asc"),
        );

        // This listener updates in real-time!
        onSnapshot(q, (snapshot) => {
          const container = document.getElementById("messages-container");
          container.innerHTML = ""; // Clear and redraw (simple method)

          snapshot.forEach((doc) => {
            const data = doc.data();
            const isMe = data.uid === auth.currentUser.uid;

            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${isMe ? "my-message" : "friend-message"}`;
            msgDiv.innerHTML = `
                        <p>${data.text}</p>
                        <small>${isMe ? "You" : data.displayName}</small>
                    `;
            container.appendChild(msgDiv);
          });

          // Scroll to bottom
          container.scrollTop = container.scrollHeight;
        });
      };
    </script>
  </body>
</html>
