<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #5d63ff, #e8c8ef);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 25px;
      }

      .card {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      }

      .left {
        text-align: center;
      }

      .avatar-box {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        overflow: hidden;
        margin: auto;
        border: 5px solid #6b74ff;
        background: #eee;
      }

      .avatar-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .left h2 {
        margin-top: 18px;
        font-size: 24px;
      }

      .left p {
        color: #666;
        margin-top: 8px;
      }

      .upload-btn {
        margin-top: 20px;
        display: inline-block;
        background: #6673ff;
        color: #fff;
        padding: 12px 18px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
      }

      .left button {
        width: 100%;
        margin-top: 18px;
        border: none;
        background: #ff4b6e;
        color: #fff;
        padding: 12px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .right h1 {
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
      }

      .input-group.full {
        grid-column: 1/3;
      }

      label {
        font-size: 14px;
        margin-bottom: 8px;
        color: #555;
      }

      input,
      textarea {
        border: none;
        outline: none;
        background: #edf0f7;
        padding: 14px;
        border-radius: 14px;
        font-size: 15px;
      }

      textarea {
        resize: none;
        min-height: 110px;
      }

      .save-btn {
        margin-top: 20px;
        border: none;
        background: #6673ff;
        color: #fff;
        padding: 14px 22px;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .gallery {
        margin-top: 25px;
      }

      .gallery h3 {
        margin-bottom: 15px;
      }

      .images {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 15px;
      }

      .images img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 16px;
      }

      .small-upload {
        display: inline-block;
        margin-bottom: 18px;
        background: #6673ff;
        color: #fff;
        padding: 10px 16px;
        border-radius: 12px;
        cursor: pointer;
      }

      input[type="file"] {
        display: none;
      }

      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card left">
        <div class="avatar-box">
          <img id="avatarPreview" src="https://via.placeholder.com/300" />
        </div>

        <h2 id="showName">User Name</h2>
        <p id="showEmail">email@gmail.com</p>

        <label class="upload-btn">
          Upload Avatar
          <input type="file" id="avatarInput" accept="image/*" />
        </label>

        <button id="logoutBtn">Logout</button>
      </div>

      <div class="card right">
        <h1>Your Profile</h1>

        <div class="grid">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" />
          </div>

          <div class="input-group">
            <label>Phone</label>
            <input type="text" id="phone" />
          </div>

          <div class="input-group full">
            <label>Short Description</label>
            <textarea id="bio"></textarea>
          </div>
        </div>

        <button class="save-btn" id="saveBtn">Save Profile</button>

        <div class="gallery">
          <h3>Your Images</h3>

          <label class="small-upload">
            Upload Image
            <input type="file" id="galleryInput" accept="image/*" />
          </label>

          <div class="images" id="imagesBox"></div>
        </div>
      </div>
    </div>

      // import firebase
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

      // firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyBVbNvpjsSjSyGTn5Kvk5iaAi0S2KvF5Ks",
        authDomain: "jsi04-c3a8c.firebaseapp.com",
        projectId: "jsi04-c3a8c",
        storageBucket: "jsi04-c3a8c.firebasestorage.app",
        messagingSenderId: "241743024495",
        appId: "1:241743024495:web:31c9c9cf6cc87fb757d89a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const storage = getStorage(app);

      let currentUser;

      // =========================
      // CHECK LOGIN
      // =========================
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUser = user;

          // hiện email và tên google luôn
          document.getElementById("showEmail").innerText = user.email || "";

          document.getElementById("showName").innerText =
            user.displayName || "User Name";

          if (user.photoURL) {
            document.getElementById("avatarPreview").src = user.photoURL;
          }

          await loadProfile();
        } else {
          // chỉ đá nếu chưa login thật
          setTimeout(() => {
            if (!auth.currentUser) {
              window.location.href = "index.html";
            }
          }, 1500);
        }
      });

      // =========================
      // LOAD PROFILE
      // =========================
      async function loadProfile() {
        const userRef = doc(db, "users", currentUser.uid);
        const snap = await getDoc(userRef);

        if (snap.exists()) {
          const data = snap.data();

          username.value = data.username || currentUser.displayName || "";
          phone.value = data.phone || "";
          bio.value = data.bio || "";

          showName.innerText =
            data.username || currentUser.displayName || "User Name";

          if (data.avatar) {
            avatarPreview.src = data.avatar;
          }
        } else {
          await setDoc(userRef, {
            email: currentUser.email,
            username: currentUser.displayName || "",
            phone: "",
            bio: "",
            avatar: currentUser.photoURL || "",
          });

          username.value = currentUser.displayName || "";
        }
      }

      // =========================
      // SAVE PROFILE
      // =========================
      document.getElementById("saveBtn").addEventListener("click", async () => {
        try {
          const data = {
            email: currentUser.email,
            username: username.value,
            phone: phone.value,
            bio: bio.value,
          };

          await setDoc(doc(db, "users", currentUser.uid), data, {
            merge: true,
          });

          showName.innerText = username.value;

          alert("Saved successfully!");
        } catch (err) {
          console.log(err);
          alert(err.message);
        }
      });

      // =========================
      // UPLOAD AVATAR
      // =========================
      avatarInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const storageRef = ref(storage, "avatars/" + currentUser.uid);

        await uploadBytes(storageRef, file);

        const url = await getDownloadURL(storageRef);

        avatarPreview.src = url;

        await setDoc(
          doc(db, "users", currentUser.uid),
          { avatar: url },
          { merge: true },
        );
      };

      // upload gallery
      galleryInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const fileName = Date.now() + "_" + file.name;

        const fileRef = ref(storage, `gallery/${currentUser.uid}/${fileName}`);

        await uploadBytes(fileRef, file);

        const url = await getDownloadURL(fileRef);

        await updateDoc(doc(db, "users", currentUser.uid), {
          images: arrayUnion(url),
        });

        const img = document.createElement("img");
        img.src = url;
        imagesBox.appendChild(img);
      };

      // render images
      function renderImages(arr) {
        imagesBox.innerHTML = "";

        arr.forEach((url) => {
          const img = document.createElement("img");
          img.src = url;
          imagesBox.appendChild(img);
        });
      }

      // logout
      logoutBtn.onclick = async () => {
        await signOut(auth);
        window.location.href = "profilelogin.html";
      };
