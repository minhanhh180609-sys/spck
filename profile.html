<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp — Hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #6367ff 0%, #8494ff 60%, #c9beff 100%);
        min-height: 100vh;
      }

      /* Navbar */
      .navbar-app { background: rgba(83, 87, 210, 0.95); backdrop-filter: blur(8px); }

      /* Cards */
      .profile-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      }

      /* Avatar */
      .avatar-wrapper {
        position: relative;
        display: inline-block;
      }
      .avatar-circle {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 4px solid #6367ff;
        overflow: hidden;
        background: #e0e0ff;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: #6367ff;
      }
      .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
      .avatar-upload-btn {
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #6367ff;
        border: 2px solid #fff;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }
      .avatar-upload-btn:hover { background: #4f53e0; }

      /* Inputs */
      .form-control, .form-select {
        border-radius: 12px;
        border: 1.5px solid #e0e0e0;
        padding: 10px 14px;
        background: #f7f8ff;
        transition: 0.2s;
      }
      .form-control:focus {
        border-color: #6367ff;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(99, 103, 255, 0.15);
      }
      textarea.form-control { resize: none; }

      /* Buttons */
      .btn-save {
        background: #6367ff;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        padding: 10px 28px;
        transition: 0.2s;
      }
      .btn-save:hover { background: #4f53e0; }

      /* Gallery */
      .gallery-img-wrapper {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 1;
        background: #eee;
      }
      .gallery-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .gallery-img-wrapper .del-btn {
        display: none;
        position: absolute;
        top: 4px;
        right: 4px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(0,0,0,.55);
        color: #fff;
        border: none;
        font-size: 12px;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .gallery-img-wrapper:hover .del-btn { display: flex; }
    </style>
  </head>

  <body>
    <!-- ══════════ NAVBAR ══════════ -->
    <nav class="navbar navbar-app navbar-dark px-4 mb-4">
      <a class="navbar-brand fw-bold" href="chat.html">
        <i class="bi bi-arrow-left-circle me-2"></i>ChatApp
      </a>
      <span class="text-white opacity-75 small">
        <i class="bi bi-person-lines-fill me-1"></i>Hồ sơ cá nhân
      </span>
    </nav>

    <!-- ══════════ CONTENT ══════════ -->
    <div class="container pb-5" style="max-width: 960px;">
      <div class="row g-4">

        <!-- ── LEFT: Avatar & Actions ── -->
        <div class="col-md-4">
          <div class="profile-card card p-4 text-center h-100">

            <!-- Avatar -->
            <div class="avatar-wrapper mx-auto mb-3">
              <div class="avatar-circle" id="avatarCircle">
                <img id="avatarPreview" src="" alt="avatar" style="display:none;" />
                <i class="bi bi-person-fill" id="avatarIcon"></i>
              </div>
              <label class="avatar-upload-btn" title="Đổi ảnh đại diện">
                <i class="bi bi-camera-fill"></i>
                <input type="file" id="avatarInput" accept="image/*" hidden />
              </label>
            </div>

            <h5 class="fw-bold mb-1" id="showName">...</h5>
            <p class="text-muted small mb-1" id="showEmail">...</p>
            <span class="badge bg-primary-subtle text-primary mb-3" id="showBio" style="font-size:12px;display:none;"></span>

            <hr />

            <a href="chat.html" class="btn btn-outline-primary w-100 mb-2 rounded-pill">
              <i class="bi bi-house-fill me-2"></i>Trang chủ
            </a>
            <a href="chat.html" class="btn btn-outline-success w-100 mb-2 rounded-pill">
              <i class="bi bi-people-fill me-2"></i>Chat nhóm
            </a>
            <button id="logoutBtn" class="btn btn-danger w-100 rounded-pill">
              <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
            </button>
          </div>
        </div>

        <!-- ── RIGHT: Edit Form & Gallery ── -->
        <div class="col-md-8 d-flex flex-column gap-4">

          <!-- Edit Profile -->
          <div class="profile-card card p-4">
            <h5 class="fw-bold mb-4">
              <i class="bi bi-pencil-square me-2 text-primary"></i>Chỉnh sửa hồ sơ
            </h5>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label text-muted small fw-semibold">Tên hiển thị</label>
                <input type="text" class="form-control" id="username" placeholder="Tên của bạn" />
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted small fw-semibold">Số điện thoại</label>
                <input type="text" class="form-control" id="phone" placeholder="0xxx xxx xxx" />
              </div>
              <div class="col-12">
                <label class="form-label text-muted small fw-semibold">Giới thiệu bản thân</label>
                <textarea class="form-control" id="bio" rows="3"
                          placeholder="Viết vài dòng về bạn..."></textarea>
              </div>
            </div>

            <div class="d-flex align-items-center gap-3 mt-4">
              <button class="btn btn-save btn-primary text-white" id="saveBtn">
                <span id="saveSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
                <i class="bi bi-check2-circle me-2"></i>Lưu thay đổi
              </button>
              <span id="saveStatus" class="text-muted small d-none">
                <i class="bi bi-check-circle-fill text-success me-1"></i>Đã lưu!
              </span>
            </div>
          </div>

          <!-- Gallery -->
          <div class="profile-card card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="fw-bold mb-0">
                <i class="bi bi-images me-2 text-primary"></i>Ảnh của bạn
              </h5>
              <label class="btn btn-outline-primary btn-sm rounded-pill px-3">
                <i class="bi bi-upload me-1"></i>Tải ảnh lên
                <input type="file" id="galleryInput" accept="image/*" hidden />
              </label>
            </div>

            <div id="galleryEmpty" class="text-center text-muted py-4 small">
              <i class="bi bi-image fs-2 d-block mb-2 opacity-25"></i>
              Chưa có ảnh nào
            </div>

            <div class="row g-2" id="imagesBox"></div>
          </div>

        </div><!-- /col-md-8 -->
      </div><!-- /row -->
    </div><!-- /container -->

    <!-- Toast container -->
    <div id="toastContainer" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999;"></div>

    <!-- Loading overlay -->
    <div id="loadingOverlay"
         class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center"
         style="background:rgba(99,103,255,.15); backdrop-filter:blur(4px); z-index:9000;">
      <div class="spinner-border text-white" style="width:3rem;height:3rem;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { auth, db, storage } from "./firebase-config.js";
      import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
        doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
      import {
        ref as sRef, uploadBytes, getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

      let currentUser = null;

      // ─── AUTH CHECK ──────────────────────────────────────────────────────
      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        currentUser = user;
        document.getElementById("showEmail").textContent = user.email;
        document.getElementById("loadingOverlay").classList.replace("d-flex", "d-none");
        await loadProfile();
      });

      // ─── LOAD PROFILE ────────────────────────────────────────────────────
      async function loadProfile() {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        const data = snap.exists() ? snap.data() : {};

        const name = data.username || currentUser.displayName || currentUser.email.split("@")[0];

        document.getElementById("username").value = name;
        document.getElementById("phone").value    = data.phone || "";
        document.getElementById("bio").value      = data.bio   || "";
        document.getElementById("showName").textContent = name;

        if (data.bio) {
          const badge = document.getElementById("showBio");
          badge.textContent    = data.bio.slice(0, 60) + (data.bio.length > 60 ? "…" : "");
          badge.style.display  = "inline-block";
        }

        // Avatar
        const photoURL = data.photoURL || currentUser.photoURL || "";
        setAvatar(photoURL);

        // Gallery
        if (data.images?.length) {
          document.getElementById("galleryEmpty").style.display = "none";
          data.images.forEach(url => addGalleryImage(url));
        }
      }

      function setAvatar(url) {
        const preview = document.getElementById("avatarPreview");
        const icon    = document.getElementById("avatarIcon");
        if (url) {
          preview.src           = url;
          preview.style.display = "block";
          icon.style.display    = "none";
        } else {
          preview.style.display = "none";
          icon.style.display    = "block";
        }
      }

      // ─── SAVE PROFILE ────────────────────────────────────────────────────
      document.getElementById("saveBtn").addEventListener("click", async () => {
        const name  = document.getElementById("username").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const bio   = document.getElementById("bio").value.trim();

        if (!name) return toast("Tên hiển thị không được để trống!", "warning");

        setLoading(true);
        try {
          await setDoc(doc(db, "users", currentUser.uid), { username: name, phone, bio }, { merge: true });

          document.getElementById("showName").textContent = name;
          if (bio) {
            const badge = document.getElementById("showBio");
            badge.textContent   = bio.slice(0, 60) + (bio.length > 60 ? "…" : "");
            badge.style.display = "inline-block";
          }

          // Hiện trạng thái "Đã lưu"
          const status = document.getElementById("saveStatus");
          status.classList.remove("d-none");
          setTimeout(() => status.classList.add("d-none"), 3000);

          toast("Đã lưu hồ sơ thành công! ✅", "success");
        } catch (err) {
          toast("Lỗi: " + err.message, "danger");
        } finally {
          setLoading(false);
        }
      });

      function setLoading(on) {
        document.getElementById("saveBtn").disabled = on;
        document.getElementById("saveSpinner").classList.toggle("d-none", !on);
      }

      // ─── UPLOAD AVATAR ────────────────────────────────────────────────────
      document.getElementById("avatarInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) return toast("Ảnh quá lớn! Tối đa 5MB.", "warning");

        toast("Đang tải ảnh lên...", "info");
        try {
          const storageRef = sRef(storage, `avatars/${currentUser.uid}`);
          await uploadBytes(storageRef, file);
          const url = await getDownloadURL(storageRef);

          setAvatar(url);
          await setDoc(doc(db, "users", currentUser.uid), { photoURL: url }, { merge: true });
          toast("Đã cập nhật ảnh đại diện! 🎉", "success");
        } catch (err) {
          toast("Lỗi upload: " + err.message, "danger");
        }
      });

      // ─── UPLOAD GALLERY ───────────────────────────────────────────────────
      document.getElementById("galleryInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) return toast("Ảnh quá lớn! Tối đa 10MB.", "warning");

        toast("Đang tải ảnh lên...", "info");
        try {
          const fileName   = `${Date.now()}_${file.name}`;
          const storageRef = sRef(storage, `gallery/${currentUser.uid}/${fileName}`);
          await uploadBytes(storageRef, file);
          const url = await getDownloadURL(storageRef);

          await updateDoc(doc(db, "users", currentUser.uid), { images: arrayUnion(url) });

          document.getElementById("galleryEmpty").style.display = "none";
          addGalleryImage(url);
          toast("Đã thêm ảnh vào thư viện! 📸", "success");
        } catch (err) {
          toast("Lỗi upload: " + err.message, "danger");
        } finally {
          e.target.value = "";
        }
      });

      // ─── GALLERY RENDER ───────────────────────────────────────────────────
      function addGalleryImage(url) {
        const col = document.createElement("div");
        col.className = "col-4 col-sm-3";

        const wrapper = document.createElement("div");
        wrapper.className = "gallery-img-wrapper";

        const img = document.createElement("img");
        img.src = url;

        const delBtn = document.createElement("button");
        delBtn.className = "del-btn";
        delBtn.innerHTML = '<i class="bi bi-x"></i>';
        delBtn.title = "Xóa ảnh";
        delBtn.addEventListener("click", async () => {
          if (!confirm("Xóa ảnh này?")) return;
          try {
            await updateDoc(doc(db, "users", currentUser.uid), { images: arrayRemove(url) });
            col.remove();
            const box = document.getElementById("imagesBox");
            if (!box.querySelector(".gallery-img-wrapper")) {
              document.getElementById("galleryEmpty").style.display = "block";
            }
            toast("Đã xóa ảnh!", "success");
          } catch (err) {
            toast("Lỗi xóa: " + err.message, "danger");
          }
        });

        wrapper.appendChild(img);
        wrapper.appendChild(delBtn);
        col.appendChild(wrapper);
        document.getElementById("imagesBox").appendChild(col);
      }

      // ─── LOGOUT ───────────────────────────────────────────────────────────
      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "index.html";
      });

      // ─── TOAST ────────────────────────────────────────────────────────────
      function toast(message, type = "success") {
        const el = document.createElement("div");
        el.className = `toast align-items-center text-white bg-${type} border-0 mb-2`;
        el.setAttribute("role", "alert");
        el.innerHTML = `
          <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
          </div>`;
        document.getElementById("toastContainer").appendChild(el);
        new bootstrap.Toast(el, { delay: 3500 }).show();
        el.addEventListener("hidden.bs.toast", () => el.remove());
      }
    </script>
  </body>
</html>
